name: Update publications

on:
  schedule:
    - cron: '23 2 * * 1'   # Mondays 02:23 UTC (10:23 Beijing)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate publications page from DBLP
        run: python3 tools/generate_publications.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet publications.html; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add publications.html
          git commit -m "chore: auto-update publications from DBLP"
          git push
